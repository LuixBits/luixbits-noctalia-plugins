id = "bridge"
entry = "entries/service/bridge.luau"

[[widget]]
id = "status"
entry = "entries/widgets/status.luau"

  [[widget.setting]]
  key = "label"
  type = "string"
  label_key = "settings.widget.label.label"
  description_key = "settings.widget.label.description"
  default = "Casio"

  [[widget.setting]]
  key = "show_label"
  type = "bool"
  label_key = "settings.widget.show_label.label"
  description_key = "settings.widget.show_label.description"
  default = true

  [[widget.setting]]
  key = "show_press_count"
  type = "bool"
  label_key = "settings.widget.show_press_count.label"
  description_key = "settings.widget.show_press_count.description"
  default = true

  [[widget.setting]]
  key = "hide_disconnected"
  type = "bool"
  label_key = "settings.widget.hide_disconnected.label"
  description_key = "settings.widget.hide_disconnected.description"
  default = false

[[shortcut]]
id = "toggle"
entry = "entries/shortcuts/shortcut.luau"

[[desktop_widget]]
id = "dashboard"
entry = "dashboard.luau"
