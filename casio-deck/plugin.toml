id = "luixbits/casio-deck"
name = "Casio Deck"
version = "0.1.1"
plugin_api = 3
author = "LuixBits"
license = "MIT"
tags = ["watch", "controller", "stream-deck", "casio"]
icon = "device-watch"
description = "Experimental Casio ABL-100WE controller for Noctalia on Wayland."

[[setting]]
key = "notify_on_press"
type = "bool"
label_key = "settings.notify_on_press.label"
description_key = "settings.notify_on_press.description"
default = true

[[setting]]
key = "helper_command"
type = "string"
label_key = "settings.helper_command.label"
description_key = "settings.helper_command.description"
default = ""
advanced = true

[[setting]]
key = "autostart_helper"
type = "bool"
label_key = "settings.autostart_helper.label"
description_key = "settings.autostart_helper.description"
default = false
advanced = true

[[setting]]
key = "stop_command"
type = "string"
label_key = "settings.stop_command.label"
description_key = "settings.stop_command.description"
default = ""
advanced = true

[[setting]]
key = "pair_command"
type = "string"
label_key = "settings.pair_command.label"
description_key = "settings.pair_command.description"
default = ""
advanced = true

[[setting]]
key = "watch_model"
type = "select"
label_key = "settings.watch_model.label"
description_key = "settings.watch_model.description"
default = "casio_abl100we_3565"
options = [
  { value = "casio_abl100we_3565", label_key = "settings.watch_model.options.casio_abl100we_3565" },
]

[[setting]]
key = "saved_watch_name"
